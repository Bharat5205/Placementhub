<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 240" width="100%" height="100%">
  <style>
    .logo-text {
      font-family: "Times New Roman", Times, Georgia, serif;
      font-size: 155px;
      font-weight: 500;
      fill: #000000;
    }
    .logo-line {
      stroke: #000000;
      stroke-width: 8;
      stroke-linecap: butt;
      fill: none;
    }
  </style>

  <!-- Left horizontal line above 'D E Shaw' which then slants upwards -->
  <path d="M 0 45 L 640 45 L 775 10" class="logo-line" />

  <!-- Right horizontal line above 'Co' -->
  <path d="M 800 45 L 995 45" class="logo-line" />

  <!-- Spaced letters for DE Shaw & Co -->
  <text x="0" y="200" class="logo-text">D E Shaw &amp; Co</text>
</svg>
